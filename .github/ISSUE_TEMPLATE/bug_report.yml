name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. The more detail, the faster we can fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
      placeholder: When I click "Save Job" on a Greenhouse page, ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a job posting on ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 15.0, Chrome 130, ApplyPulse v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant console output, screenshots, or stack traces.
      render: shell
